<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保安條碼系統 - 終極修復版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 20px; background: #f0f2f5; }
        .container { max-width: 500px; margin: 0 auto; }
        
        /* 頁籤切換按鈕 */
        .nav-tabs { display: flex; margin-bottom: 20px; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-btn { flex: 1; padding: 12px; background: #ddd; border: none; font-size: 16px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: #3498db; color: white; }

        /* 掃描介面 */
        #reader { width: 100%; background: white; border-radius: 8px; overflow: hidden; min-height: 200px; }
        #result-screen { width: 100%; height: 120px; margin: 20px 0; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; font-weight: bold; transition: background 0.2s; background: #888; white-space: pre-line; }
        .green { background: #2ecc71 !important; }
        .red { background: #e74c3c !important; }

        /* 後台管理介面 */
        .card { background: white; padding: 20px; border-radius: 8px; text-align: left; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .hidden { display: none !important; }
        textarea { width: 100%; box-sizing: border-box; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 10px; }
        input[type="password"] { width: 100%; box-sizing: border-box; padding: 10px; font-size: 16px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .btn { width: 100%; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-danger { background: #e74c3c; }

        /* 歷史紀錄 */
        #scan-history { max-height: 150px; overflow-y: auto; padding-left: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('scan')">📷 保安掃描</button>
        <button class="tab-btn" onclick="switchTab('admin')">⚙️ 後台管理</button>
    </div>

    <div id="page-scan">
        <div id="reader"></div>
        <div id="result-screen">⏳ 正在初始化相機...</div>
        
        <div class="card">
            <h3>⏱️ 最近掃描紀錄</h3>
            <ul id="scan-history"></ul>
        </div>
    </div>

    <div id="page-admin" class="hidden">
        <div id="admin-auth">
            <div class="card">
                <h3>🔒 管理員驗證</h3>
                <input type="password" id="admin-password" placeholder="請輸入後台管理密碼">
                <button class="btn" onclick="checkPassword()">登入後台</button>
            </div>
        </div>

        <div id="admin-content" class="hidden">
            <div class="card">
                <h3>📝 批量更新條碼</h3>
                <p style="color: #666; font-size: 14px;">請直接貼上你的條碼清單（每行一個條碼）：</p>
                <textarea id="valid-barcodes" rows="8" placeholder="例如：&#10;BARCODE001&#10;BARCODE002"></textarea>
                <button class="btn" onclick="saveBarcodes()">💾 儲存條碼清單</button>
                <button class="btn btn-danger" onclick="clearBarcodes()">🗑️ 清空所有條碼</button>
            </div>
            
            <div class="card">
                <h3>📊 目前系統資訊</h3>
                <p>總計有效條碼數量：<strong id="barcode-count">0</strong> 個</p>
                <button class="btn btn-danger" style="background:#f39c12;" onclick="logoutAdmin()">登出後台</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 💡 後台管理密碼
    const ADMIN_PASSWORD = "admin123"; 

    let isProcessing = false; 
    let resetTimeout = null;
    let html5Qrcode = null;

    // 網頁載入時自動讀取資料
    window.onload = function() {
        try {
            const savedData = localStorage.getItem('my_barcodes');
            if (savedData) {
                document.getElementById('valid-barcodes').value = savedData;
            } else {
                document.getElementById('valid-barcodes').value = "BARCODE001\nBARCODE002\n12345678";
            }
            updateBarcodeCount();
        } catch(e) {
            console.error("讀取本地儲存失敗", e);
        }
        
        // 延遲 0.5 秒啟動相機，確保網頁元件都載入完畢
        setTimeout(initScanner, 500);
    };

    // 初始化與啟動相機
    function initScanner() {
        // 防禦機制：檢查掃描庫有沒有成功載入
        if (typeof Html5Qrcode === 'undefined') {
            document.getElementById('result-screen').className = "red";
            document.getElementById('result-screen').innerText = "❌ 掃描庫載入失敗，請檢查網絡或更換瀏覽器。";
            return;
        }

        try {
            if (!html5Qrcode) {
                html5Qrcode = new Html5Qrcode("reader");
            }
            
            const config = { 
                fps: 25, 
                qrbox: { width: 280, height: 90 },
                experimentalFeatures: { useBarCodeDetectorIfSupported: true }
            };

            html5Qrcode.start(
                { facingMode: "environment" }, 
                config, 
                onScanSuccess
            )
            .then(() => {
                document.getElementById('result-screen').className = "";
                document.getElementById('result-screen').innerText = "⏳ 等待掃描...";
            })
            .catch((err) => {
                console.warn("鏡頭啟動失敗，嘗試極簡相容模式...", err);
                // 降級相容模式
                html5Qrcode.start({ facingMode: "environment" }, { fps: 15 }, onScanSuccess)
                .then(() => {
                    document.getElementById('result-screen').className = "";
                    document.getElementById('result-screen').innerText = "⏳ 等待掃描 (相容模式)...";
                })
                .catch((e) => {
                    document.getElementById('result-screen').className = "red";
                    document.getElementById('result-screen').innerText = "❌ 無法開啟鏡頭，請手動檢查相機權限。";
                });
            });
        } catch (e) {
            console.error("初始化掃描器時發生崩潰", e);
        }
    }

    // 掃描成功邏輯
    function onScanSuccess(decodedText, decodedResult) {
        if (isProcessing) return; 
        isProcessing = true;

        const validList = document.getElementById('valid-barcodes').value
                            .split('\n').map(item => item.trim()).filter(item => item !== "");

        const resultScreen = document.getElementById('result-screen');
        const historyList = document.getElementById('scan-history');
        const now = new Date().toLocaleTimeString();

        if (validList.includes(decodedText)) {
            resultScreen.className = "green";
            resultScreen.innerText = `🟢 驗證成功\n${decodedText}`;
            let li = document.createElement('li');
            li.innerHTML = `<span style="color:green; font-weight:bold;">[成功]</span> ${now} - ${decodedText}`;
            historyList.prepend(li);
        } else {
            resultScreen.className = "red";
            resultScreen.innerText = `🔴 無此紀錄\n${decodedText}`;
            let li = document.createElement('li');
            li.innerHTML = `<span style="color:red; font-weight:bold;">[失敗]</span> ${now} - ${decodedText}`;
            historyList.prepend(li);
        }

        if (resetTimeout) clearTimeout(resetTimeout);
        resetTimeout = setTimeout(() => {
            resultScreen.className = "";
            resultScreen.innerText = "⏳ 請對準下一個條碼...";
            isProcessing = false; 
        }, 1500);
    }

    // 🟢 確保按鈕百分之百可以點擊的切換邏輯
    function switchTab(tab) {
        const btnScan = document.querySelectorAll('.tab-btn')[0];
        const btnAdmin = document.querySelectorAll('.tab-btn')[1];
        const pageScan = document.getElementById('page-scan');
        const pageAdmin = document.getElementById('page-admin');

        if (tab === 'scan') {
            btnScan.classList.add('active');
            btnAdmin.classList.remove('active');
            pageScan.classList.remove('hidden');
            pageAdmin.classList.add('hidden');
            if(html5Qrcode && !html5Qrcode.isScanning) { initScanner(); }
        } else {
            btnScan.classList.remove('active');
            btnAdmin.classList.add('active');
            pageScan.classList.add('hidden');
            pageAdmin.classList.remove('hidden');
            // 如果相機開著，關閉它；如果相機沒開或出錯，忽略錯誤，照樣切換到後台
            if(html5Qrcode && html5Qrcode.isScanning) { 
                html5Qrcode.stop().catch(err => console.log("關閉相機跳過")); 
            }
        }
    }

    // 後台密碼驗證
    function checkPassword() {
        const inputPass = document.getElementById('admin-password').value;
        if (inputPass === ADMIN_PASSWORD) {
            document.getElementById('admin-auth').classList.add('hidden');
            document.getElementById('admin-content').classList.remove('hidden');
            document.getElementById('admin-password').value = ""; 
        } else {
            alert("❌ 密碼錯誤！");
        }
    }

    // 儲存條碼
    function saveBarcodes() {
        const textData = document.getElementById('valid-barcodes').value;
        try {
            localStorage.setItem('my_barcodes', textData);
            updateBarcodeCount();
            alert("💾 條碼清單已成功儲存！");
        } catch(e) {
            alert("❌ 儲存失敗，請確保使用非無痕模式瀏覽。");
        }
    }

    // 清空條碼
    function clearBarcodes() {
        if(confirm("⚠️ 確定要清空所有條碼嗎？")) {
            document.getElementById('valid-barcodes').value = "";
            try { localStorage.removeItem('my_barcodes'); } catch(e){}
            updateBarcodeCount();
        }
    }

    // 更新數量
    function updateBarcodeCount() {
        const list = document.getElementById('valid-barcodes').value
                        .split('\n').map(item => item.trim()).filter(item => item !== "");
        document.getElementById('barcode-count').innerText = list.length;
    }

    // 登出
    function logoutAdmin() {
        document.getElementById('admin-auth').classList.remove('hidden');
        document.getElementById('admin-content').classList.add('hidden');
    }
</script>
</body>
</html>
